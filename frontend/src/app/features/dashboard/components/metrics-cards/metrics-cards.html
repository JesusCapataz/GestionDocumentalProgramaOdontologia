<div class="metrics-grid fade-up delay-2">
  
  <div class="metric-card">
    <div class="metric-label">Total Anexos</div>
    <div class="metric-value">{{ total }}</div>
    <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="10" y1="8" x2="16" y2="8"/><line x1="10" y1="12" x2="14" y2="12"/></svg></div>
  </div>

  <div class="metric-card" 
       [class.card-active]="filtroActualizadosActivo" 
       [class.card-loading]="isLoadingActualizados"
       (click)="!isLoadingActualizados && toggleActualizados.emit()" 
       [style.cursor]="isLoadingActualizados ? 'not-allowed' : 'pointer'" 
       title="Ver documentos actualizados recientemente">
    <div class="metric-label">Actualizados <span class="metric-period-badge">Últimos 10 días</span></div>
    <div class="metric-value">{{ actualizados }}</div>
    <div class="metric-icon">
      <svg *ngIf="!isLoadingActualizados" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
      <svg *ngIf="isLoadingActualizados" class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </div>
  </div>

  <div class="metric-card">
    <div class="metric-label">Años Cubiertos</div>
    <div class="metric-value">{{ rangoAnios }}</div>
    <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
  </div>

</div>
